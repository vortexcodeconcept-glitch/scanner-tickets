<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner de Tickets</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
      text-align: center; 
      padding: 20px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #333; margin-bottom: 10px; font-size: 2em; }
    .subtitle { color: #666; margin-bottom: 30px; }
    #reader { 
      width: 100%; 
      border-radius: 15px; 
      overflow: hidden; 
      margin: 20px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    #result { 
      margin: 20px 0; 
      padding: 20px; 
      border-radius: 12px; 
      font-size: 1.2em; 
      font-weight: bold;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
    .error { background: linear-gradient(135deg, #eb3349, #f45c43); color: white; }
    .loading { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    button { 
      margin: 10px 5px;
      padding: 15px 30px; 
      font-size: 1em; 
      cursor: pointer; 
      border: none; 
      border-radius: 10px;
      font-weight: bold;
    }
    .btn-restart { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-manual { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    #manual-input { 
      margin-top: 20px; 
      padding: 20px; 
      background: #f8f9fa;
      border-radius: 12px; 
      display: none;
    }
    #manual-input input { 
      width: 100%; 
      padding: 15px; 
      font-size: 1.1em; 
      border: 2px solid #ddd; 
      border-radius: 10px;
      margin: 10px 0;
      text-align: center;
    }
    .tips {
      background: #fff3cd;
      color: #856404;
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
      font-size: 0.9em;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📷 Scanner de Tickets</h1>
    <p class="subtitle">Scannez les QR codes pour valider les tickets</p>
    
    <div class="tips">
      <strong>💡 Conseils pour scanner :</strong>
      <ul style="margin: 10px 0 0 0; padding-left: 20px;">
        <li>Approchez-vous du QR code (15-20 cm)</li>
        <li>Assurez-vous d'avoir une bonne luminosité</li>
        <li>Pour les QR codes sombres, éclairez-les bien</li>
      </ul>
    </div>
    
    <div id="reader"></div>
    <div id="result" class="loading">🔄 Initialisation...</div>
    
    <div>
      <button class="btn-restart" onclick="redemarrerScan()">🔄 Redémarrer</button>
      <button class="btn-manual" onclick="basculerSaisieManuelle()">⌨️ Saisie manuelle</button>
    </div>

    <div id="manual-input">
      <h3>Saisie manuelle</h3>
      <input type="text" id="ticket-input" placeholder="Entrez l'ID du ticket">
      <button class="btn-restart" onclick="verifierManuel()">✅ Valider</button>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySV7T_x9c6V4AWziYI89Jbf0h-OLSyMnon-P7vNCIC0KjJ4d0lzMm12hQynSvWMptIGw/exec';
    
    let html5QrCode;
    let isProcessing = false;

    async function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;
      
      document.getElementById('result').className = 'loading';
      document.getElementById('result').innerText = '⏳ Vérification...';
      
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain',
          },
          body: decodedText
        });
        
        const data = await response.json();
        document.getElementById('result').innerText = data.message;
        document.getElementById('result').className = data.success ? 'success' : 'error';
      } catch (err) {
        console.error('Erreur:', err);
        document.getElementById('result').innerText = '❌ Erreur de connexion';
        document.getElementById('result').className = 'error';
      }
      
      setTimeout(() => { isProcessing = false; }, 2000);
    }

    function demarrerScanner() {
      html5QrCode = new Html5Qrcode("reader");
      
      // Configuration optimisée pour les QR codes sombres
      const config = { 
        fps: 10, 
        qrbox: { width: 300, height: 300 },
        aspectRatio: 1.0,
        disableFlip: false,
        formatsToSupport: ['QR_CODE']
      };
      
      html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess
      ).catch(err => {
        console.error("Erreur caméra:", err);
        document.getElementById('result').className = 'error';
        document.getElementById('result').innerText = '❌ Erreur caméra';
      });
    }

    function redemarrerScan() {
      if (html5QrCode) {
        html5QrCode.stop()
          .then(() => {
            html5QrCode.clear();
            setTimeout(demarrerScanner, 500);
          })
          .catch(demarrerScanner);
      } else {
        demarrerScanner();
      }
    }

    function basculerSaisieManuelle() {
      const div = document.getElementById('manual-input');
      div.style.display = div.style.display === 'none' ? 'block' : 'none';
      if (div.style.display === 'block') {
        document.getElementById('ticket-input').focus();
        if (html5QrCode && html5QrCode.isScanning) {
          html5QrCode.pause();
        }
      } else {
        if (html5QrCode && html5QrCode.isScanning) {
          html5QrCode.resume();
        }
      }
    }

    async function verifierManuel() {
      const id = document.getElementById('ticket-input').value.trim();
      if (!id) {
        alert("Veuillez entrer un ID");
        return;
      }
      
      document.getElementById('result').className = 'loading';
      document.getElementById('result').innerText = '⏳ Vérification...';
      
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain',
          },
          body: id
        });
        
        const data = await response.json();
        document.getElementById('result').innerText = data.message;
        document.getElementById('result').className = data.success ? 'success' : 'error';
        document.getElementById('ticket-input').value = '';
      } catch (err) {
        document.getElementById('result').innerText = '❌ Erreur';
        document.getElementById('result').className = 'error';
      }
    }

    window.addEventListener('load', () => {
      setTimeout(demarrerScanner, 500);
    });

    document.getElementById('ticket-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifierManuel();
    });
  </script>
</body>
</html>
