<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner de Tickets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
      text-align: center; 
      padding: 20px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #333; margin-bottom: 10px; font-size: 2em; }
    .subtitle { color: #666; margin-bottom: 30px; }
    #video-container {
      position: relative;
      width: 100%;
      border-radius: 15px;
      overflow: hidden;
      margin: 20px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      background: #000;
    }
    #video {
      width: 100%;
      display: block;
    }
    #scan-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      border: 3px solid #00ff00;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }
    #result { 
      margin: 20px 0; 
      padding: 20px; 
      border-radius: 12px; 
      font-size: 1.2em; 
      font-weight: bold;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
    .error { background: linear-gradient(135deg, #eb3349, #f45c43); color: white; }
    .loading { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    .btn-manual { 
      background: linear-gradient(135deg, #f093fb, #f5576c); 
      color: white;
      padding: 15px 30px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }
    #manual-input { 
      margin-top: 20px; 
      padding: 20px; 
      background: #f8f9fa;
      border-radius: 12px; 
      display: none;
    }
    #manual-input input { 
      width: 100%; 
      padding: 15px; 
      font-size: 1.1em; 
      border: 2px solid #ddd; 
      border-radius: 10px;
      margin: 10px 0;
      text-align: center;
    }
    .error-msg {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📷 Scanner de Tickets</h1>
    <p class="subtitle">Scan en temps réel</p>
    
    <div id="video-container">
      <video id="video" playsinline autoplay muted></video>
      <div id="scan-overlay"></div>
    </div>
    
    <div id="result" class="loading">🔄 Initialisation...</div>
    
    <div>
      <button class="btn-manual" onclick="toggleManual()">⌨️ Saisie manuelle</button>
    </div>

    <div id="manual-input">
      <h3>Saisie manuelle</h3>
      <input type="text" id="ticket-input" placeholder="Entrez l'ID du ticket">
      <button class="btn-manual" onclick="verifierManuel()">✅ Valider</button>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySV7T_x9c6V4AWziYI89Jbf0h-OLSyMnon-P7vNCIC0KjJ4d0lzMm12hQynSvWMptIGw/exec';
    let isProcessing = false;
    let detector;
    let stream;
    let scanInterval;

    async function initScanner() {
      try {
        // Utiliser BarcodeDetector API (native, ultra rapide)
        if ('BarcodeDetector' in window) {
          detector = new BarcodeDetector({
            formats: ['qr_code']
          });
          document.getElementById('result').innerText = '📷 Pointez vers un QR code...';
          startCamera();
        } else {
          // Fallback: charger jsQR
          document.getElementById('result').innerText = '⏳ Chargement...';
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
          script.onload = () => {
            document.getElementById('result').innerText = '📷 Pointez vers un QR code...';
            startCamera();
          };
          document.head.appendChild(script);
        }
      } catch (err) {
        console.error(err);
        document.getElementById('result').className = 'error';
        document.getElementById('result').innerText = '❌ Erreur initialisation';
      }
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        
        const video = document.getElementById('video');
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
          video.play();
          scanLoop();
        };
      } catch (err) {
        console.error('Erreur caméra:', err);
        document.getElementById('result').className = 'error';
        document.getElementById('result').innerText = '❌ Accès caméra refusé';
      }
    }

    async function scanLoop() {
      if (isProcessing) {
        setTimeout(scanLoop, 500);
        return;
      }

      const video = document.getElementById('video');
      
      if (detector) {
        // Utiliser BarcodeDetector (rapide)
        try {
          const barcodes = await detector.detect(video);
          if (barcodes.length > 0) {
            await processQRCode(barcodes[0].rawValue);
          }
        } catch (e) {
          console.error(e);
        }
      } else if (window.jsQR) {
        // Utiliser jsQR (fallback)
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        
        if (code) {
          await processQRCode(code.data);
        }
      }
      
      scanInterval = setTimeout(scanLoop, 100); // Scan toutes les 100ms
    }

    async function processQRCode(text) {
      if (isProcessing || !text) return;
      isProcessing = true;
      
      document.getElementById('result').className = 'loading';
      document.getElementById('result').innerText = '⏳ Vérification...';
      
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: text
        });
        
        const data = await response.json();
        document.getElementById('result').innerText = data.message;
        document.getElementById('result').className = data.success ? 'success' : 'error';
        
        if (data.success) {
          await new Promise(r => setTimeout(r, 2000));
          document.getElementById('result').className = 'loading';
          document.getElementById('result').innerText = '📷 Prêt à scanner';
        }
      } catch (err) {
        console.error('Erreur:', err);
        document.getElementById('result').innerText = '❌ Erreur connexion';
        document.getElementById('result').className = 'error';
      }
      
      isProcessing = false;
    }

    function toggleManual() {
      const div = document.getElementById('manual-input');
      div.style.display = div.style.display === 'none' ? 'block' : 'none';
      if (div.style.display === 'block') {
        document.getElementById('ticket-input').focus();
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
      } else {
        initScanner();
      }
    }

    async function verifierManuel() {
      const id = document.getElementById('ticket-input').value.trim();
      if (!id) {
        alert("Veuillez entrer un ID");
        return;
      }
      
      if (isProcessing) return;
      await processQRCode(id);
      document.getElementById('ticket-input').value = '';
    }

    window.addEventListener('load', initScanner);
    
    document.getElementById('ticket-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifierManuel();
    });

    window.addEventListener('beforeunload', () => {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      if (scanInterval) {
        clearTimeout(scanInterval);
      }
    });
  </script>
</body>
</html>
