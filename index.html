<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner de Tickets</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
      text-align: center; 
      padding: 20px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #333; margin-bottom: 10px; font-size: 2em; }
    .subtitle { color: #666; margin-bottom: 30px; }
    #result { 
      margin: 20px 0; 
      padding: 20px; 
      border-radius: 12px; 
      font-size: 1.2em; 
      font-weight: bold;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
    .error { background: linear-gradient(135deg, #eb3349, #f45c43); color: white; }
    .loading { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    .scan-btn {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: white;
      font-size: 1.5em;
      padding: 25px 50px;
      margin: 20px 0;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
    }
    .btn-manual { 
      background: linear-gradient(135deg, #f093fb, #f5576c); 
      color: white;
      padding: 15px 30px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    #manual-input { 
      margin-top: 20px; 
      padding: 20px; 
      background: #f8f9fa;
      border-radius: 12px; 
      display: none;
    }
    #manual-input input { 
      width: 100%; 
      padding: 15px; 
      font-size: 1.1em; 
      border: 2px solid #ddd; 
      border-radius: 10px;
      margin: 10px 0;
      text-align: center;
    }
    .tips {
      background: #fff3cd;
      color: #856404;
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
      font-size: 0.9em;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📷 Scanner de Tickets</h1>
    <p class="subtitle">Scannez les QR codes pour valider les tickets</p>
    
    <div class="tips">
      <strong>💡 Comment ça marche :</strong>
      <ul style="margin: 10px 0 0 0; padding-left: 20px;">
        <li>Cliquez sur "📸 Scanner un ticket"</li>
        <li>L'appareil photo s'ouvre automatiquement</li>
        <li>Prenez une photo du QR code</li>
        <li>La vérification se fait instantanément</li>
      </ul>
    </div>
    
    <input type="file" id="qr-input" accept="image/*" capture="environment" style="display: none;">
    <button class="scan-btn" onclick="document.getElementById('qr-input').click()">📸 Scanner un ticket</button>
    
    <div id="result" class="loading">Prêt à scanner</div>
    
    <button class="btn-manual" onclick="basculerSaisieManuelle()">⌨️ Saisie manuelle</button>

    <div id="manual-input">
      <h3>Saisie manuelle</h3>
      <input type="text" id="ticket-input" placeholder="Entrez l'ID du ticket">
      <button class="btn-manual" onclick="verifierManuel()">✅ Valider</button>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySV7T_x9c6V4AWziYI89Jbf0h-OLSyMnon-P7vNCIC0KjJ4d0lzMm12hQynSvWMptIGw/exec';
    let isProcessing = false;

    // Fonction pour décoder le QR code depuis une image
    function decoderQRCode(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            
            if (code) {
              resolve(code.data);
            } else {
              reject('QR code non détecté');
            }
          };
          img.onerror = () => reject('Erreur de chargement image');
          img.src = e.target.result;
        };
        
        reader.onerror = () => reject('Erreur de lecture fichier');
        reader.readAsDataURL(file);
      });
    }

    // Quand l'utilisateur prend une photo
    document.getElementById('qr-input').addEventListener('change', async (e) => {
      if (isProcessing) return;
      isProcessing = true;
      
      const file = e.target.files[0];
      if (!file) {
        isProcessing = false;
        return;
      }
      
      document.getElementById('result').className = 'loading';
      document.getElementById('result').innerText = '⏳ Analyse du QR code...';
      
      try {
        // Décoder le QR code
        const decodedText = await decoderQRCode(file);
        
        document.getElementById('result').innerText = '⏳ Vérification du ticket...';
        
        // Envoyer au serveur
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain',
          },
          body: decodedText
        });
        
        const data = await response.json();
        document.getElementById('result').innerText = data.message;
        document.getElementById('result').className = data.success ? 'success' : 'error';
        
      } catch (err) {
        console.error('Erreur:', err);
        document.getElementById('result').innerText = '❌ QR code non détecté. Réessayez.';
        document.getElementById('result').className = 'error';
      }
      
      // Reset l'input pour pouvoir scanner à nouveau
      e.target.value = '';
      setTimeout(() => { isProcessing = false; }, 2000);
    });

    function basculerSaisieManuelle() {
      const div = document.getElementById('manual-input');
      div.style.display = div.style.display === 'none' ? 'block' : 'none';
      if (div.style.display === 'block') {
        document.getElementById('ticket-input').focus();
      }
    }

    async function verifierManuel() {
      const id = document.getElementById('ticket-input').value.trim();
      if (!id) {
        alert("Veuillez entrer un ID");
        return;
      }
      
      if (isProcessing) return;
      isProcessing = true;
      
      document.getElementById('result').className = 'loading';
      document.getElementById('result').innerText = '⏳ Vérification...';
      
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain',
          },
          body: id
        });
        
        const data = await response.json();
        document.getElementById('result').innerText = data.message;
        document.getElementById('result').className = data.success ? 'success' : 'error';
        document.getElementById('ticket-input').value = '';
      } catch (err) {
        document.getElementById('result').innerText = '❌ Erreur';
        document.getElementById('result').className = 'error';
      }
      
      setTimeout(() => { isProcessing = false; }, 2000);
    }

    document.getElementById('ticket-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifierManuel();
    });
  </script>
</body>
</html>
